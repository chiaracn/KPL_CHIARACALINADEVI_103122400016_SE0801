<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengkonversi Gaya Teks</title>

  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Pengkonversi Gaya Teks</h1>
    <p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>

    <label for="textInput">Masukkan teks:</label>
    <textarea id="textInput" placeholder="Kata-kata..."></textarea>

    <p>
      Huruf: <span id="jumlahHuruf">0</span>,
      huruf besar: <span id="hurufBesar">0</span>
      huruf kecil: <span id="hurufKecil">0</span>
    </p>

    <div class="buttons">
      <button onclick="toUpperCaseText()">Besarkan</button>
      <button onclick="toLowerCaseText()">Kecilkan</button>
      <button onclick="toParagraphText()">Paragrafkan</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
