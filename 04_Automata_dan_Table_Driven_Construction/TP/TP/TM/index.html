<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengkonversi Gaya Teks</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="light-mode">
  <div class="container">
    <h1>Pengkonversi Gaya Teks</h1>
    <p>Alat ini bisa mengubah teks menjadi huruf besar, huruf kecil, dan paragraf.</p>

    <label for="textInput">Masukkan teks:</label>
    <textarea id="textInput" placeholder="Kata-kata..."></textarea>

    <p id="infoText">
      Huruf: <span id="charCount">0</span>,
      huruf besar: <span id="upperCount">0</span>
      huruf kecil: <span id="lowerCount">0</span>
    </p>

    <div class="button-group">
      <button id="uppercaseBtn">Besarkan</button>
      <button id="lowercaseBtn">Kecilkan</button>
    </div>

    <div class="mode-div">
      <button id="light">Mode Terang</button>
      <button id="dark">Mode Gelap</button>
      <button id="sepia">Mode Sepia</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
